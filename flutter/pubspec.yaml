name: face_reader
description: 'A Flutter project.'
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  camera: ^0.11.1
  mediapipe_face_mesh: ^1.2.4
  path_provider: ^2.1.0
  image_picker: ^1.1.0
  google_mlkit_face_detection: ^0.12.0
  http: ^1.2.0
  crypto: ^3.0.6
  flutter_markdown: ^0.7.6

  # State Management
  flutter_riverpod: ^3.0.3

  # HTTP
  dio: ^5.4.0

  # Routing
  go_router: ^17.1.0

  # Freezed
  freezed_annotation: ^3.0.0
  json_annotation: ^4.8.1

  # Local Storage
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  build_runner: ^2.4.7
  flutter_launcher_icons: '^0.14.4'
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: 'launcher_icon'
  ios: true
  image_path: 'assets/icons/icon.png'
  min_sdk_android: 21 # android min sdk min:16, default 21
  remove_alpha_ios: true

flutter_native_splash:
  android: true
  ios: true

  color: '#FFFFFF'
  color_dark: '#FFFFFF'
  image: 'assets/images/face-reader.png'

  android_12:
    color: '#FFFFFF'
    color_dark: '#FFFFFF'
    image: 'assets/images/face-reader.png'

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
  fonts:
    - family: SongMyung
      fonts:
        - asset: assets/fonts/SongMyung-Regular.ttf
